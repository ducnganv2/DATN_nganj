  type: markdown
  name: about
  desc: Giới thiệu
  value: |
    # about About {{ name }} / Về {{ name }}
    {{ name }} is an online judge platform for programming practice, algorithm training, and contest hosting.

    Users can solve problems, submit source code, view judging results, review submission history, and participate in contests or training courses created by administrators.

    Our goal is to provide a clear, fair, and easy-to-use environment for students, teachers, trainers, and contest organizers.

    {{ name }} là nền tảng chấm bài trực tuyến phục vụ học lập trình, luyện giải thuật và tổ chức thi đấu.

    Trên hệ thống, người dùng có thể làm bài, nộp mã nguồn, theo dõi kết quả chấm, xem lịch sử nộp bài và tham gia các cuộc thi hoặc khóa luyện tập do quản trị viên tạo.

    Mục tiêu của {{ name }} là cung cấp một môi trường luyện tập rõ ràng, công bằng và dễ sử dụng cho học sinh, sinh viên, giảng viên và ban tổ chức.

    # contact Contact / Liên hệ
    If you need help with your account, problems, judging results, or technical issues, please contact the system administrator.

    When requesting support, please include useful details such as your username, problem ID, submission ID, and a brief description of the issue.

    Nếu cần hỗ trợ về tài khoản, bài tập, kết quả chấm hoặc vấn đề kỹ thuật, vui lòng liên hệ quản trị viên của hệ thống.

    Khi gửi yêu cầu hỗ trợ, bạn nên cung cấp đầy đủ thông tin như tên tài khoản, mã bài, mã lượt nộp và mô tả ngắn gọn lỗi gặp phải để việc xử lý nhanh hơn.

    # privacy Privacy / Quyền riêng tư
    {{ name }} only collects data required to operate the service, including account information, submissions, judging results, activity logs, and technical data needed for security.

    This data is used to provide the service, maintain the system, detect abuse, troubleshoot issues, and improve the user experience.

    Users should avoid putting sensitive personal information in display names, discussions, or submitted source code.

    {{ name }} chỉ thu thập các dữ liệu cần thiết để vận hành hệ thống, bao gồm thông tin tài khoản, bài nộp, kết quả chấm, nhật ký hoạt động và một số dữ liệu kỹ thuật phục vụ bảo mật.

    Dữ liệu này được dùng để cung cấp dịch vụ, duy trì hệ thống, phát hiện gian lận, xử lý sự cố và cải thiện trải nghiệm sử dụng.

    Chúng tôi không khuyến khích người dùng đưa thông tin cá nhân nhạy cảm vào tên hiển thị, nội dung thảo luận hoặc mã nguồn nộp lên hệ thống.

    # tos Terms of Service / Điều khoản sử dụng
    By registering for or using {{ name }}, you agree to follow the platform rules, the rules of any related contest or training course, and applicable laws.

    Users must not attack the system, damage data, disrupt the service, publish illegal content, violate intellectual property rights, or use another user's account without permission.

    In contests and activities that require academic integrity, users are responsible for their own submissions. The system may record submission history, judging logs, and abnormal signals for review when necessary.

    Administrators may hide or remove violating content, rejudge submissions, cancel results, suspend accounts, or take other appropriate actions to protect fairness and system security.

    Khi đăng ký hoặc sử dụng {{ name }}, bạn đồng ý tuân thủ quy định của hệ thống, quy định của cuộc thi hoặc khóa học liên quan, và pháp luật hiện hành.

    Người dùng không được tấn công hệ thống, phá hoại dữ liệu, làm gián đoạn dịch vụ, đăng nội dung trái pháp luật, vi phạm bản quyền hoặc sử dụng tài khoản của người khác khi chưa được phép.

    Trong các bài thi và hoạt động có yêu cầu liêm chính học thuật, người dùng phải tự chịu trách nhiệm về bài nộp của mình. Hệ thống có thể ghi nhận lịch sử nộp bài, log chấm bài và các dấu hiệu bất thường để phục vụ kiểm tra khi cần.

    Quản trị viên có quyền ẩn hoặc xóa nội dung vi phạm, chấm lại bài, hủy kết quả, khóa tài khoản hoặc áp dụng biện pháp phù hợp khác để bảo vệ tính công bằng và an toàn của hệ thống.
