Common causes:: 'Nguyên nhân thường gặp:'
Selected language does not match your code.: Ngôn ngữ đã chọn không khớp với code của bạn.
Java main class is not named {0}.: Class main của Java không có tên là {0}.
General syntax or build issues.: Lỗi cú pháp hoặc lỗi build chung.
Training plans are curated problem sequences for structured practice.: Các khóa luyện tập là chuỗi bài được tuyển chọn để luyện tập có cấu trúc.
Different rulesets use different ranking and scoring logic.: Mỗi bộ luật dùng cách xếp hạng và tính điểm khác nhau.
Refer to each contest page for exact rules and penalty behavior.: Xem trang từng cuộc thi để biết luật và cách phạt chính xác.
Accepted ratio can be noisy and is not always a reliable indicator of difficulty.: Tỉ lệ AC có thể nhiễu và không phải lúc nào cũng phản ánh chính xác độ khó.
RP can be obtained from problems, activities, and contests based on platform rules.: RP có thể nhận được từ bài tập, hoạt động và cuộc thi theo quy tắc của nền tảng.
RP Algorithm: Thuật toán RP
Problem difficulty is estimated from submissions, acceptance behavior, and evaluation history.: Độ khó bài tập được ước tính từ lượt nộp, hành vi AC và lịch sử đánh giá.
New problems may have unstable difficulty values.: Bài mới có thể có giá trị độ khó chưa ổn định.
Difficulty becomes more stable with more submissions.: Độ khó sẽ ổn định hơn khi có nhiều lượt nộp.
Algorithmic estimation may still be imperfect.: Ước tính bằng thuật toán vẫn có thể chưa hoàn hảo.
