After you've performed a sudo-protected action, you'll only be asked to re-authenticate again after a few hours of inactivity.: Sau khi bạn thực hiện một thao tác cần sudo, bạn chỉ cần xác thực lại sau vài giờ không hoạt động.
Are you sure to print this file?: Bạn chắc chắn muốn in file này?
