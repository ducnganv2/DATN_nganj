Auto adjust the format of line breaks and remove unnecessary whitespace characters.: Tự động chuẩn hóa xuống dòng và xóa ký tự khoảng trắng không cần thiết.
By signing up a {0} universal account, you can submit code and join discussions in all online judging services provided by us.: Khi đăng ký tài khoản {0}, bạn có thể nộp code và tham gia thảo luận trên tất cả dịch vụ chấm bài trực tuyến do chúng tôi cung cấp.
For better problem version management and validation, we suggest using Polyhedron to prepare problems.: Để quản lý phiên bản bài tập và kiểm tra tốt hơn, chúng tôi khuyến nghị dùng Polyhedron để chuẩn bị bài.
Hello! You can click following link to sign up your {0} account:: 'Xin chào! Bạn có thể bấm liên kết sau để đăng ký tài khoản {0}:'
Hello, {0}! You can click following link to active your new email of your {1} account:: 'Xin chào, {0}! Bạn có thể bấm liên kết sau để kích hoạt email mới cho tài khoản {1}:'
Hello, {0}! You can click following link to reset the password of your {1} account:: 'Xin chào, {0}! Bạn có thể bấm liên kết sau để đặt lại mật khẩu cho tài khoản {1}:'
Ignore trailing space and enter.: Bỏ qua khoảng trắng cuối dòng và phím Enter.
Keep original problem owner. Only used if this problemset is exported from current system.: Giữ nguyên chủ sở hữu bài gốc. Chỉ dùng khi bộ bài được xuất từ hệ thống hiện tại.
LaTeX Expressions: Biểu thức LaTeX
Make the problem hidden.: Ẩn bài tập này.
Mark user as joined using admin privilege: Đánh dấu người dùng đã tham gia bằng quyền quản trị
Polyhedron supports managing problem version history, testing solutions, checking time limits, composing contest statements, cooperation and much more.: Polyhedron hỗ trợ quản lý lịch sử phiên bản bài, kiểm thử lời giải, kiểm tra giới hạn thời gian, soạn đề thi, cộng tác và nhiều tính năng khác.
Problems created in polyhedron can be directly imported into any Hydro based online judge system.: Bài được tạo bằng Polyhedron có thể nhập trực tiếp vào mọi hệ thống online judge dựa trên Hydro.
Ranking: Xếp hạng
The contest is a flexible time contest. You need to complete the contest within a specified time after you attended.: Đây là cuộc thi thời gian linh hoạt. Bạn cần hoàn thành trong thời gian quy định sau khi tham gia.
The contest is ended. New submissions will be treated as correction submissions and will not be counted in the contest.: Cuộc thi đã kết thúc. Lượt nộp mới sẽ được tính là lượt sửa bài và không được tính vào cuộc thi.
The discussion is locked, you can not reply anymore.: Thảo luận đã bị khóa, bạn không thể trả lời thêm.
The domain owner:: 'Chủ sở hữu miền:'
The link will be expired at {0}: Liên kết sẽ hết hạn lúc {0}
The preferred problem ID prefix.: Tiền tố ID bài tập ưu tiên.
The ranking page is not updated realtime.: Trang xếp hạng không được cập nhật theo thời gian thực.
The scoreboard was frozen with {0} minutes remaining at {1} - submissions in the last {0} minutes of the contest are still shown as pending.: Bảng xếp hạng đã bị đóng băng khi còn {0} phút vào lúc {1} - các lượt nộp trong {0} phút cuối vẫn hiển thị là đang chờ.
Their account will not be deleted and they will be with the guest role until they re-join the domain.: Tài khoản của họ sẽ không bị xóa và họ sẽ có vai trò khách cho đến khi tham gia lại miền.
This email was requested from {0}: Email này được yêu cầu từ {0}
This email was sent by {0} automatically, and please do not reply directly.: Email này được {0} gửi tự động, vui lòng không trả lời trực tiếp.
This is a copy of another problem.: Đây là bản sao của một bài khác.
This page is only for pasting code from other sources.: Trang này chỉ dùng để dán code từ nguồn khác.
This section cannot be challenged at present, so please complete the following sections first: Hiện chưa thể thử thách phần này, vui lòng hoàn thành các phần trước.
To join the domain, users can click the "Join Domain" button on "My Domain" page.: Để tham gia miền, người dùng có thể bấm nút "Tham gia miền" ở trang "Miền của tôi".
Unsupported configure this type of problem. Please refer to the documentation.: Không hỗ trợ cấu hình loại bài này. Vui lòng xem tài liệu.
Users will have to manually join the domain first before selected roles can be applied.: Người dùng cần tự tham gia miền trước khi có thể áp dụng các vai trò đã chọn.
'Using custom font: {0}': 'Đang dùng font tùy chỉnh: {0}'
Using your {0} universal account: Dùng tài khoản {0} của bạn
We will check code similarity after this contest.: Chúng tôi sẽ kiểm tra độ tương đồng code sau cuộc thi này.
Webauthn is not available in insecure context.: WebAuthn không khả dụng trong ngữ cảnh không bảo mật.
With this feature, you can import problems that you can view from a site to here. Their title, content, tags and categories will be imported.: Với tính năng này, bạn có thể nhập các bài mà bạn xem được từ một trang khác vào đây. Tiêu đề, nội dung, tag và danh mục sẽ được nhập.
You are currently in legacy mode. Some additional features will be unavailable. We strongly recommend switching to standard mode on a modern browser.: Bạn đang ở chế độ cũ. Một số tính năng bổ sung sẽ không khả dụng. Chúng tôi khuyến nghị chuyển sang chế độ chuẩn trên trình duyệt hiện đại.
You cannot submit for this problem because the contest is ended. You can click "Open in Problem Set" to view this problem in normal mode.: Bạn không thể nộp bài này vì cuộc thi đã kết thúc. Bạn có thể bấm "Mở trong kho bài tập" để xem bài ở chế độ thường.
Your account has two factor authentication enabled. Please choose an authenticator to verify.: Tài khoản của bạn đã bật xác thực hai yếu tố. Vui lòng chọn trình xác thực để xác minh.
Your browser does not support WebAuthn or you are not in secure context.: Trình duyệt của bạn không hỗ trợ WebAuthn hoặc bạn không ở ngữ cảnh bảo mật.
